<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <form class="card w-50 p-5 m-auto shadow">
        <label for="" class="fw-bold">Quantity</label>
        <input type="number" id="qty" class="border-0 shadow rounded"><br>
        <select id="product">
            <option value="1500" id="phone" >Iphone 17 pro max1500</option>
            <option value="500" id="watch" >Apple watch 500</option>
        </select><br>
        <button class=" btn w-25 border-0 rounded fw-bold bg-primary text-light" onclick="display(event)">buy now</button>
    </form>
    <div class="m-auto card"id="reciept">

        
    </div>
    <script>
        function display(event){
            event.preventDefault(); 
                let price =  Number(document.getElementById("product").value);
                let quntity = Number(document.getElementById("qty").value);
                let dis;
                let total= quntity * price;
                if(total<=300){
                    dis=10;
                }else if(total<=400){
                    dis=20;
                }else{
                    dis=30;
                }
                let payment = total - (total * dis) / 100;

                document.getElementById("reciept").innerHTML =`
                    <div class="card w-50 rounded border-2 m-auto mt-3 p-3">
                        <p>Price : <strong>$${price}</strong></p>
                        <p>Quantity : <strong>${quntity}</strong></p>
                        <p>Total : <strong>$${total}</strong></p>
                        <p>Discount : <strong>$${dis}</strong></p>
                        <p>Payment : <strong class="text-success">$${payment}</strong></p>
                    
                    </div>`;
                
             
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
