    <script>
        let num = [99, 88, 55, 54, 94, 23, 59];
        let text ="";
        for(let i=1;i<6; i+=2){
            text +=num[i]+",";
        }
        document.write(text);
        document.write("<br/>");

        let text1="";

            text1 +=num[i]+",";
        }
        document.write(text1);
        document.write("<br/>");
        
       let text2 ="";
        for(let i=4; i>=0;i=-2 ){
            text2 +=num[i]+",";
        }
        document.write(text2);
        


    </script>
