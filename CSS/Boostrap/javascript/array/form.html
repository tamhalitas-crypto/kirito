<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <form class="card m-auto shadow w-50 overflow-hidden p-3 mt-3">
        <h1 class="text-center">Student</h1>
        
           <div class="container d-flex  ">
             <div class="w-50 ">
                
                <label class="fw-bold">Name</label><br>
                <input type="text" class="text-center rounded​​ form-control" id="name"><br>
               
            </div>
            <div class="w-50 ">
                 <label class="fw-bold " >age</label><br>
                 <input type="text" class="text-center rounded form-control" id="age"><br>
            </div>
           </div>
           <div class="container d-flex  ">
             <div class="w-50 ">
                <label class="fw-bold">Gender</label><br>
                <input type="text" class="text-center rounded form-control" id="gender"><br>
               
            </div>
            <div class="w-50 ">
                 <label class="fw-bold " >building</label><br>
                 <input type="text" class="text-center rounded form-control" id="building"><br>
            </div>
           </div>
           <div class="container d-flex  ">
             <div class="w-50 ">
                <label class="fw-bold">Room</label><br>
                <input type="text" class="text-center rounded form-control" id="room"><br>
               
            </div>
            <div class="w-50 ">
                 <label class="fw-bold " >tnak</label><br>
                 <input type="text" class="text-center rounded form-control" id="class"><br>
            </div>
           </div>
           <div class="justify-content-between g-4 mt-4 p-4​ d-flex">
            <button type="button" class="w-25 rounded bg-primary text-light fw-bold border-0" onclick="add()">Add</button>
            <button type="button" class="w-25 rounded bg-primary text-light fw-bold border-0" onclick="remove()">Delete</button>
           </div> 
    </form>
            <div class="mt-3 container w-50">
           <table id="result" class="table table-bordered"></table>
           </div>
    <script>
        student=[];
        function add(){
            showData()
            let newstudent = {
            name:document.getElementById("name").value,
            age:document.getElementById("age").value,
            gender:document.getElementById("gender").value,
            building:document.getElementById("building").value,
            room:document.getElementById("room").value,
            class:document.getElementById("class").value,
             };
             student.push(newstudent);
             showData()
             document.getElementById("name").value = "";
            document.getElementById("age").value = "";
            document.getElementById("gender").value = "";
            document.getElementById("building").value = "";
            document.getElementById("room").value = "";
            document.getElementById("class").value = "";
        }
             function showData() {
            let txt = `

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Building</th>
                    <th>Room</th>
                    <th>Class</th>
                </tr>
            </thead>
            <tbody>
            `;
            for (let i = 0; i < student.length; i++) {
                txt += `
                <tr>
                    <td>${student[i].name}</td>
                    <td>${student[i].age}</td>
                    <td>${student[i].gender}</td>
                    <td>${student[i].building}</td>
                    <td>${student[i].room}</td>
                    <td>${student[i].class}</td>
                </tr>
                `;
            }

            txt += '</tbody>'; // Fixed missing quotes here

            document.getElementById("result").innerHTML = txt;
        }
        function remove() {
            student.pop();
            showData();
        }
        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
