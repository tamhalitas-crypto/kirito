<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="input">
    <button onclick="add()">Add</button>
    <button onclick="remove()">delete</button>

    <ul id="li">

    </ul>
    <script>
        array=[];
        function add(){
            let input =document.getElementById("input");
            if(input.value== "")return;
            array.push(input.value);
            // ដើម្បីបង្ហាញ
            display();
            input.value="" ;   
        }
        function display(){
            let result = document.getElementById("li");
            // ដាក់ដើម្បីអោយវាបាត់ពេលadd ហើយ
            result.innerHTML ="";
            for(let i=0; i<array.length; i++){
                result.innerHTML +=`
                <li>${array[i]}</li>
                `
            }     
        }
        function remove(){
            array.pop();
            display();
        }
    </script>
</body>
</html>
