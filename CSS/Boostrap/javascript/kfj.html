<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <form id="calcForm" class="card w-50 p-3 g-3 shadow rounded m-auto d-flex justify-content-between mt-5">
        <h1 class="text-center fw-bold">Calculate</h1>
        <div class="row">
            <div class="col col-lg-12">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="w-100">
                        <label class="fw-bold">num1</label><br>
                        <input type="text" id="num1" class="border-0 rounded shadow w-75"><br><br>
                    </div>
                    
                    <button type="button" class="m-auto w-25 border-0 bg-primary text-light fw-bold fs-5 rounded shadow" value="+" onclick="calculate(this, event)">+</button>
                </div>
                <div class="d-flex align-items-center justify-content-between">
                    <div class="w-100">
                        <label class="fw-bold">num2</label><br>
                        <input type="text" id="num2" class="border-0 rounded shadow w-75"><br><br>
                    </div>
                    <button type="button" class="m-auto w-25 border-0 bg-primary text-light fw-bold fs-5 rounded shadow" value="-" onclick="calculate(this, event)">-</button>
                </div>
                <div class="d-flex align-items-center justify-content-between">
                    <div class="w-100">
                        <label class="fw-bold">num3</label><br>
                        <input type="text" id="num3" class="border-0 rounded shadow w-75"><br><br>
                    </div>
                    <button type="button" class="m-auto w-25 border-0 bg-primary text-light fw-bold fs-5 rounded shadow" value="*" onclick="calculate(this, event)">*</button>
                </div>
                <div class="d-flex align-items-center justify-content-between">
                    <div class="w-100">
                        <label class="fw-bold">num4</label><br>
                        <input type="text" id="num4" class="border-0 rounded shadow w-75"><br><br>
                    </div>
                    <button type="button" class="m-auto w-25 border-0 bg-primary text-light fw-bold fs-5 rounded shadow" value="/" onclick="calculate(this, event)">/</button>
                </div>
                
                <hr>
                <h3 class="text-center">Result: <span id="result">0</span></h3>
            </div>
        </div>
    </form>

    <script>
        function calculate(button, event) {
           
            event.preventDefault();

            
            let n1 = parseFloat(document.getElementById("num1").value) || 0;
            let n2 = parseFloat(document.getElementById("num2").value) || 0;
            let n3 = parseFloat(document.getElementById("num3").value) || 0;
            let n4 = parseFloat(document.getElementById("num4").value) || 0;

            
            let operator = button.value;
            let total = 0;

            switch(operator) {
                case "+":
                    total = n1 + n2 + n3 + n4;
                    break;
                case "-":
                    total = n1 - n2 - n3 - n4;
                    break;
                case "*":
                    total = n1 * n2 * n3 * n4;
                    break;
                case "/":
                    
                    total = (n2 === 0 || n3 === 0 || n4 === 0) ? "Cannot divide by zero" : n1 / n2 / n3 / n4;
                    break;
            }

           
            document.getElementById("result").innerText = total;
        }
    </script>
</body>
</html>
