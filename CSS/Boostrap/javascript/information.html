<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid d-flex g-4">
        <div class="w-50 container p-1">
            <form class="border-1 bg-dark-subtle container mt-3 rounded p-2" >
                <h1​ class="fw-bold " style="margin-left: 150px; ">ការគ្រប់គ្រងបញ្ជីរឈ្មោះសិស្ស</h1><BR></BR>
                <div class="d-flex">
                    <div class="w-50">
                        <label for="">ID</label><br>
                        <input type="text"​ id="id" class="fs-6 w-75 rounded"><br>
                    </div>

                    <div class="w-50">
                        <label for="">name</label><br>
                         <input type="text" id="name" class="fs-6 w-75 rounded"><br>
                    </div>
                </div>

                <div class="d-flex">
                    <div class="w-50">
                        <label for="">Room</label><br>
                        <input type="text" id="room" class="fs-6 w-75 rounded"><br>
                    </div>

                    <div class="w-50">
                        <label for="">Year</label><br>
                         <input type="text"id="year" class="fs-6 w-75 rounded"><br>
                    </div>
                </div>

                <label for="">HTML</label><br>
                <input type="text" id="html" class="fs-6 w-75 rounded"><br>

                <label for="">CSS</label><br>
                <input type="text" id="css" class="fs-6 w-75 rounded"><br>

                <label for="">JS</label><br>
                <input type="text" id="js" class="fs-6 w-75 rounded"><br><br>

                <button type="button" onclick="result()" class="rounded bg-danger text-light fw-bold border-0">submit</button>
                
            </form>

        </div>
        <div class="w-50 container ">
            <div id="table_container" class="border-1 bg-dark-subtle container mt-3 rounded p-2   "></div>
                <script >
                    function result(){
                        let id = document.getElementById("id").value;
                        let name = document.getElementById("name").value;
                        let room = document.getElementById("room").value;
                        let year = document.getElementById("year").value;
                        let grade="";

                        let html = Number(document.getElementById("html").value)||0;
                        let css = Number(document.getElementById("css").value)||0;
                        let js = Number(document.getElementById("js").value)||0;

                        let total=html+css+js;
                        let average = total / 3;
                        
                        if (average < 50) {
                            grade = "F";
                        } else if (average < 60) {
                            grade = "E";
                        } else if (average < 70) {
                            grade = "D";
                        } else if (average < 80) {
                            grade = "C";
                        } else if (average < 90) {
                            grade = "B";
                        } else {
                            grade = "A";
                        }
                        document.getElementById("table_container").innerHTML += `
                        <div class="card p-4 mb-4 bg-white">
                            <h1 class="fs-6 mb-3 text-black ">
                            សិស្សឈ្មោះ : ${name} ឆ្នាំទី : ${year} បន្ទប់ : ${room}
                        </h1>

                        <table class="table table-bordered table-striped">
                            <thead class="table-danger">
                                <tr>
                                    <th>ID</th>
                                    <th>HTML</th>
                                    <th>CSS</th>
                                    <th>JS</th>
                                    <th>Total</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>${id}</td>
                                    <td>${html}</td>
                                    <td>${css}</td>
                                    <td>${js}</td>
                                    <td>${total}</td>
                                    <td>${grade}</td>
                                </tr>
                            </tbody>
                        </table>
                        </div>
                        `;
                    }

                </script>
           </div>
        
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
</body>
</html>
