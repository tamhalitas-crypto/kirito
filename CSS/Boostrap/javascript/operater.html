<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let code;
        let name ;
        let qty, price;
        let total,dis,payment;

         code = prompt("Input code :");
         name = prompt("Input name :");
         qty = parseInt(prompt("input quntity :"));
         price = parseFloat(prompt("input price :"));
         total=price*qty;

        if(total>=1&&total<10){
           dis=10;
           payment= total-(total*dis)/100;
        }else if(total>=10&&total<20){
            dis=20;
            payment= total-(total*dis)/100;
        }else if(total>=20){
            dis=30;
            payment= total-(total*dis)/100;
        }else if (total>=20&&total<30){
            dis=40;
            payment= total-(total*dis)/100;
        }else if (total>=30&&total<40){
            dis=50;
            payment= total-(total*dis)/100;
        }else if(total>=40&&total<50){
            dis=60;
            payment= total-(total*dis)/100;
        }
        document.write("Code     :" +code+"<br/>");
        document.write("Name     :" +name+"<br/>");
        document.write("Quntity  :" +qty+"<br/>");
        document.write("price    :$" +price+"<br/>");
        document.write("total    :$" +total+ "<br/>");
        document.write("Disscount:" + dis+"%" +"<br/>");
        document.write("Payment :$" + payment+ "<br/>");

    </script>
</body>
</html>
