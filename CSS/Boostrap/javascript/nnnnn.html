<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   
    <div class="container-fluid d-flex row m-0 p-4">

        <form class="col-md-4 border p-4 rounded bg-light h-100">
            <h3 class="mb-4">Information of Employee</h3>
            
            <div class="mb-3">
                <label for="id" class="form-label fw-bold">ID</label>
                <input type="text" id="id" class="form-control">
            </div>

            <div class="mb-3">
                <label for="name" class="form-label fw-bold">Name</label>
                <input type="text" id="name" class="form-control">
            </div>

            <div class="mb-3">
                <label for="gender" class="form-label fw-bold">Gender</label>
                <input type="text" id="gender" class="form-control">
            </div>

            <div class="mb-3">
                <label for="address" class="form-label fw-bold">Address</label>
                <input type="text" id="address" class="form-control">
            </div>

            <div class="mb-3">
                <label for="position" class="form-label fw-bold">Position</label>
                <input type="text" id="position" class="form-control">
            </div>

            <div class="mb-3">
                <label for="salary" class="form-label fw-bold">Salary</label>
                <input type="text" id="salary" class="form-control">
            </div>

            <div class="mt-4">
                <button type="button" onclick="calculateScore()" class="btn btn-danger me-2">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>

        
        <div class="col-md-8 px-4">
            <table class="table table-striped table-bordered text-center align-middle">
                <thead class="table-danger">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Address</th>
                        <th>Position</th>
                        <th>Salary</th>
                    </tr>
                </thead>
                <tbody id="scoreDisplay"></tbody>
            </table>
        </div>

    </div>

    <script>
        function calculateScore(){
            
            let id = document.getElementById("id").value;
            let name = document.getElementById("name").value;
            let gender = document.getElementById("gender").value;
            let address = document.getElementById("address").value;
            let position = document.getElementById("position").value;
            let salary = document.getElementById("salary").value; 

            document.getElementById("scoreDisplay").innerHTML += `
            <tr>
                <td>${id}</td>
                <td>${name}</td>
                <td>${gender}</td>
                <td>${address}</td>
                <td>${position}</td>
                <td>${salary}</td>
            </tr>
            `;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
