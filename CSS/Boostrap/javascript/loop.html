<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="card-body text-center shadow w-50 m-auto p-3">
        <h1>enter number of loop</h1>
        <input type="text" id="num" class="w-50 fs-4 border-1 rounded-5" ><br>
        
        <button type="button" onclick="Loop()" class="bg-primary text-white fw-bold fs-5 rounded mt-3">submit</button>
    </div>
    <div class="card w-25 shadow m-auto overflow-hidden">
        <p class="object-fit-cover text-black p-4 " id="loop"></p>

    </div>
    <script>
        function Loop(){
            let num =  Number(document.getElementById("num").value);
            let write="";
            let sum = 0;
            for (let i=1; i<=num;i++){
                let fact = 1;
                for (let j=1; j<=i; j++){
                    fact*=j;
                }
                sum+=fact;
                if(i==num){
                    write+=i+"!";
                }else{
                    write+=i+"! +";
                }
                document.getElementById("loop").innerHTML=write+"="+ sum;
            }

        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
