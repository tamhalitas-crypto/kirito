<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lkdjf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid d-flex ">
        <form class="m-auto border w-50 p-5">
            <h1>Input score</h1>
            <table>HTML</table>
            <input type="text" id="score1 "class="mb-3 w-50 border-1 rounded"><br>

            <table>CSS</table>
            <input type="text" id="score2 "class="mb-3 w-50 border-1 rounded"><br>

            <table>js</table>
            <input type="text" id="score3 "class="mb-3 w-50 border-1 rounded"><br>

            <table>boostrap</table>
            <input type="text" id="score4 "class="mb-3 w-50 border-1 rounded"><br>

            <button type="button" onclick="score()" class="btn fs-2 text-danger ">Submit</button>
            <button class="reset">Reset</button>

        </form>
        <table class="table table-striped">
            <tr >
                <th>HTML</th>
                <th>CSS</th>
                <th>JS</th>
                <th>boostrap</th>
                <th>total</th>
                <th>average</th>
            </tr>
            <tbody id="scorebody"></tbody>
        </table>

    </div>
    <script>
        function  score(){
            let score1 = Number(document.getElementById("score1").value);
            let score2 = Number(document.getElementById("score2").value);
            let score3 = Number(document.getElementById("score3").value);
            let score4 = Number(document.getElementById("score4").value);

            let total = score1 + score2 + score3 + score4;
            let average = total/4;

            document.getElementById("score").innerHTML +=`
            <tr>
                <td>${score1}</td>
                <td>${score2}</td>
                <td>${score3}</td>
                <td>${score4}</td>
                <td>${total}</td>
                <td>${average}</td>
            </tr>
            `;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
